<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stato — Sam's Submission (Admin View)</title>
<style>
  :root {
    --ink: #1d1d1f;
    --muted: #6e6e73;
    --line: #e8e8ed;
    --bg: #fafafa;
    --card: #ffffff;
    --blue: #0066cc;
    --green: #16a34a;
    --amber: #d97706;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }

  header {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
    margin: 0 0 8px 0;
  }
  header .lede { color: var(--muted); font-size: 14px; margin: 0; }
  header .meta {
    display: flex; gap: 20px; margin-top: 14px;
    padding-top: 14px; border-top: 1px solid var(--line);
    font-size: 13px; color: var(--muted);
  }
  header .meta strong { color: var(--ink); font-weight: 600; }
  header .pill {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  header .pill.fresh { background: #d1fae5; color: #065f46; }
  header .pill.stale { background: #fef3c7; color: #92400e; }
  header .pill.empty { background: #f3f4f6; color: #4b5563; }

  .actions {
    display: flex; gap: 10px; margin-top: 18px;
  }
  .actions button {
    font: inherit; font-size: 13px; font-weight: 600;
    padding: 8px 16px; border-radius: 999px;
    border: 1px solid var(--line); background: white; color: var(--ink);
    cursor: pointer; transition: border-color 120ms ease, background 120ms ease;
  }
  .actions button:hover { border-color: var(--ink); }
  .actions button.primary { background: var(--blue); color: white; border-color: var(--blue); }
  .actions button.primary:hover { background: #0058b3; }

  section.card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 22px 26px; margin-bottom: 14px;
  }
  section.card h2 {
    margin: 0 0 14px 0; font-size: 16px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .row { display: grid; grid-template-columns: 220px 1fr; gap: 12px 18px; padding: 8px 0; border-top: 1px solid var(--line); }
  .row:first-of-type { border-top: none; padding-top: 0; }
  .row .label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .row .value { font-size: 14px; color: var(--ink); white-space: pre-wrap; word-break: break-word; }
  .row .value.empty { color: #c0c0c5; font-style: italic; }
  .row .value code {
    background: #f5f5f7; border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 6px; font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12.5px;
  }

  .empty-state {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 50px 30px; text-align: center; color: var(--muted);
  }
  .empty-state .ic { font-size: 36px; margin-bottom: 10px; }
  .empty-state h3 { color: var(--ink); margin: 0 0 6px 0; font-size: 17px; }

  .err-box {
    background: #fef2f2; border: 1px solid #fecaca; color: #7f1d1d;
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Sam's Submission <span id="freshness" class="pill empty">Loading…</span></h1>
    <p class="lede">Latest answers from Sam, decrypted from the GitHub-hosted submission file. Refresh to fetch the newest version.</p>
    <div class="meta">
      <span><strong>Last updated:</strong> <span id="lastUpdated">—</span></span>
      <span><strong>Submitted by:</strong> <span id="submittedBy">—</span></span>
    </div>
    <div class="actions">
      <button class="primary" id="refreshBtn">↻ Refresh</button>
      <button id="copyBtn">Copy as text</button>
      <button id="downloadTextBtn">Download .txt</button>
      <button id="downloadJsonBtn">Download .json</button>
      <button id="lockBtn">Lock</button>
    </div>
  </header>

  <div id="errBox" class="err-box" style="display: none;"></div>
  <div id="content"></div>

  <!-- ─── Messages from Sam ─── -->
  <section class="card" id="messagesCard" style="margin-top: 20px;">
    <h2>💬 Notes / questions from Sam</h2>
    <div id="messagesList" style="margin-top: 10px;"></div>
  </section>

</div>

<script src="lib.js"></script>
<script>
(function () {
  // Section definitions for the 27 April status-update reply form.
  // (When the older 23 April form's submission is loaded, fields fall through
  // to the legacy SECTION_ORDER below.)
  const SECTION_ORDER_2026_04_27 = [
    {
      title: '1. SignNow upgrade',
      fields: [
        ['signnow_status', 'Status'],
        ['signnow_notes', 'Notes'],
      ],
    },
    {
      title: '2. Vercel GitHub App',
      fields: [
        ['vercel_app_status', 'Status'],
        ['vercel_notes', 'Notes'],
      ],
    },
    {
      title: '3. LeadByte API key permissions',
      fields: [
        ['leadbyte_perms_status', 'Status'],
        ['leadbyte_notes', 'Notes'],
      ],
    },
    {
      title: '4. Bank balances widget',
      fields: [
        ['bank_source', 'Data source'],
        ['bank_notes', 'Notes'],
      ],
    },
    {
      title: '5. VAT widget',
      fields: [
        ['vat_scheme', 'VAT scheme'],
        ['vat_reserve', 'Reserve target (%)'],
      ],
    },
    {
      title: '6. P&L widget',
      fields: [
        ['pnl_costs', 'What counts as cost'],
        ['business_costs', 'Business costs spreadsheet'],
      ],
    },
    {
      title: '7. Subscriptions to track',
      fields: [
        ['subscriptions_list', 'Subscriptions list'],
      ],
    },
    {
      title: '8. Real users for testing',
      fields: [
        ['real_users', 'User list'],
      ],
    },
    {
      title: '9. Anything else',
      fields: [
        ['open_questions', 'Open questions / feedback'],
      ],
    },
  ];

  const SECTION_ORDER = [
    {
      title: '1. SignNow upgrade',
      fields: [
        ['signnow_decision', 'Decision'],
        ['signnow_alternative', 'Alternative provider'],
      ],
    },
    {
      title: '2. LeadByte API access',
      fields: [
        ['leadbyte_api_key', 'API key'],
        ['leadreports_choice', 'LeadByte vs Leadreports'],
      ],
    },
    {
      title: '3. Cloudflare R2',
      fields: [
        ['r2_card', 'Card status'],
      ],
    },
    {
      title: '4. Email "from" address',
      fields: [
        ['from_email', 'Preferred from-email'],
        ['resend_dns', 'DNS verification status'],
        ['email_notes', 'Notes'],
      ],
    },
    {
      title: '5. Domain & subdomains',
      fields: [
        ['frontend_subdomain', 'Frontend subdomain'],
        ['api_subdomain', 'Backend / API subdomain'],
        ['portal_domain', 'Client portal domain'],
        ['domain_notes', 'Notes'],
      ],
    },
    {
      title: '6. Railway hosting access',
      fields: [
        ['railway_invite', 'Invite to yash.c@octogle.com'],
        ['railway_notes', 'Notes'],
      ],
    },
    {
      title: '7. Live demo + launch',
      fields: [
        ['demo_day', 'Demo day'],
        ['demo_time', 'Demo time'],
        ['demo_focus', 'Focus areas'],
      ],
    },
    {
      title: '8. Anything else?',
      fields: [
        ['open_questions', 'Open questions / feedback'],
      ],
    },
  ];

  const RADIO_LABELS = {
    // 23 April form
    'yes-i-will-upgrade': 'Yes — I will upgrade myself',
    'yes-yash-handles': 'Yes — Octogle Team to send instructions',
    'other-provider': 'Use a different provider',
    'keep-leadbyte': 'Keep LeadByte (already built)',
    'switch-leadreports': 'Switch to Leadreports.io',
    'not-sure': 'Not sure — discuss',
    'done': 'Done',
    'will-do': 'Not yet — will do this week',
    'need-link': 'Need exact page link',
    'in-progress': 'In progress',
    'need-help': 'Need help',
    'same': 'Same as the app',
    'separate': 'Separate (e.g. portal.leadgeneration.io)',
    'yes-sent': 'Yes — already sent',
    'will-send-today': 'Not yet — sending today',
    'dont-have-railway': "Doesn't have Railway account yet",
    // 27 April status-update reply form
    'not-yet': 'Not yet',
    'will-do-today': 'Will do today',
    'upgraded': 'Upgraded ✓',
    'changed-provider': 'Changed provider — see notes',
    'installed': 'Installed ✓',
    'prefer-bump-yash-role': 'Prefer to bump Yash to Owner instead',
    'granted': 'Granted ✓',
    'keep-old-key': 'Keep using the old key',
    'xero-bank-feed': 'Xero bank feed (we wire it)',
    'open-banking': 'Open Banking (TrueLayer/Plaid — you connect)',
    'manual-entry': 'Manual balance entry for now',
    'not-needed-yet': 'Skip — not needed yet',
    'cash': 'Cash basis',
    'accrual': 'Accrual basis',
    'flat-rate': 'Flat rate',
    'not-vat-registered': 'Not VAT registered',
  };

  function pretty(field, value) {
    if (!value) return null;
    return RADIO_LABELS[value] || value;
  }

  function freshness(iso) {
    const ageMs = Date.now() - new Date(iso).getTime();
    const ageMin = Math.floor(ageMs / 60000);
    if (ageMin < 60) return { text: 'Fresh — ' + ageMin + ' min ago', cls: 'fresh' };
    const ageH = Math.floor(ageMin / 60);
    if (ageH < 24) return { text: 'Today — ' + ageH + ' h ago', cls: 'fresh' };
    const ageD = Math.floor(ageH / 24);
    return { text: ageD + ' day(s) ago', cls: 'stale' };
  }

  function escape(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  // Detect which form's data this is (a few heuristic field names suffice).
  function pickSchema(answers) {
    const NEW_FORM_KEYS = ['signnow_status', 'vercel_app_status', 'leadbyte_perms_status', 'bank_source', 'vat_scheme'];
    const isNew = NEW_FORM_KEYS.some((k) => Object.prototype.hasOwnProperty.call(answers, k));
    return isNew ? SECTION_ORDER_2026_04_27 : SECTION_ORDER;
  }

  function render(submission) {
    const fr = freshness(submission.submittedAt);
    document.getElementById('freshness').textContent = fr.text;
    document.getElementById('freshness').className = 'pill ' + fr.cls;
    document.getElementById('lastUpdated').textContent = new Date(submission.submittedAt).toLocaleString();
    document.getElementById('submittedBy').textContent = submission.submittedBy || 'sam';

    const root = document.getElementById('content');
    root.innerHTML = '';
    const a = submission.answers || {};
    const schema = pickSchema(a);
    const known = new Set();
    schema.forEach((s) => s.fields.forEach(([k]) => known.add(k)));

    for (const section of schema) {
      const card = document.createElement('section');
      card.className = 'card';
      card.innerHTML = '<h2>' + escape(section.title) + '</h2>';
      for (const [field, label] of section.fields) {
        const value = pretty(field, a[field]);
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = '<div class="label">' + escape(label) + '</div>'
          + (value
              ? '<div class="value">' + escape(value).replace(/\n/g, '<br/>') + '</div>'
              : '<div class="value empty">— not answered —</div>');
        card.appendChild(row);
      }
      root.appendChild(card);
    }

    // Show any unmapped fields (so we never silently drop data).
    const unknown = Object.entries(a).filter(([k, v]) => !known.has(k) && v);
    if (unknown.length) {
      const card = document.createElement('section');
      card.className = 'card';
      card.innerHTML = '<h2>Other answers</h2>';
      unknown.forEach(([k, v]) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = '<div class="label">' + escape(k) + '</div>'
          + '<div class="value">' + escape(String(v)).replace(/\n/g, '<br/>') + '</div>';
        card.appendChild(row);
      });
      root.appendChild(card);
    }
  }

  function renderEmpty() {
    document.getElementById('freshness').textContent = 'No submission yet';
    document.getElementById('freshness').className = 'pill empty';
    document.getElementById('lastUpdated').textContent = '—';
    document.getElementById('submittedBy').textContent = '—';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="ic">📭</div>
        <h3>No submission yet</h3>
        <p>Sam hasn't filled in the form yet. Once he does, his answers will appear here automatically.</p>
      </div>
    `;
  }

  function showError(msg) {
    const box = document.getElementById('errBox');
    box.style.display = 'block';
    box.textContent = msg;
  }

  function renderMessages(messages) {
    const root = document.getElementById('messagesList');
    if (!messages || messages.length === 0) {
      root.innerHTML = '<p style="color: #86868b; font-size: 13px; font-style: italic; margin: 0;">Sam hasn\'t sent any messages yet.</p>';
      return;
    }
    // Reverse so latest is on top.
    const sorted = [...messages].reverse();
    root.innerHTML = sorted.map((m) => {
      const isSam = m.from === 'sam';
      const bg = isSam ? '#f0f9ff' : '#f0fdf4';
      const border = isSam ? '#bae6fd' : '#bbf7d0';
      const author = isSam ? 'Sam' : 'You (Octogle Team)';
      const authorColor = isSam ? '#0066cc' : '#16a34a';
      const dt = new Date(m.timestamp).toLocaleString();
      return `
        <div style="background: ${bg}; border: 1px solid ${border}; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;">
          <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
            <strong style="color: ${authorColor}">${author}</strong>
            <span style="color: #86868b">${escape(dt)}</span>
          </div>
          <div style="font-size: 14px; color: #1d1d1f; white-space: pre-wrap;">${escape(m.text)}</div>
        </div>
      `;
    }).join('');
  }

  async function load() {
    document.getElementById('errBox').style.display = 'none';
    try {
      const password = getStoredPassword();
      if (!password) throw new Error('No password — refresh and re-enter.');
      const [submission, messages] = await Promise.all([
        loadLatest(password),
        loadMessages(password),
      ]);
      lastSubmissionForDownload = submission;
      if (!submission) renderEmpty();
      else render(submission);
      renderMessages(messages);
    } catch (err) {
      console.error(err);
      showError('Could not load submission: ' + (err.message || err));
    }
  }

  function rowsAsText() {
    const a = document.querySelectorAll('section.card');
    const lines = ['Sam — submission ' + (document.getElementById('lastUpdated').textContent), ''];
    a.forEach((card) => {
      const h = card.querySelector('h2');
      if (h) lines.push('## ' + h.textContent);
      card.querySelectorAll('.row').forEach((r) => {
        const label = r.querySelector('.label').textContent;
        const value = r.querySelector('.value').textContent;
        lines.push(label + ': ' + value);
      });
      lines.push('');
    });
    return lines.join('\n');
  }

  function copyAsText() {
    navigator.clipboard.writeText(rowsAsText());
    const b = document.getElementById('copyBtn');
    const t = b.textContent;
    b.textContent = '✓ Copied';
    setTimeout(() => { b.textContent = t; }, 1500);
  }

  let lastSubmissionForDownload = null;

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  function downloadText() {
    const blob = new Blob([rowsAsText()], { type: 'text/plain;charset=utf-8' });
    triggerDownload(blob, 'sam-submission-' + new Date().toISOString().slice(0, 10) + '.txt');
  }

  function downloadJson() {
    if (!lastSubmissionForDownload) return;
    const blob = new Blob(
      [JSON.stringify(lastSubmissionForDownload, null, 2)],
      { type: 'application/json;charset=utf-8' },
    );
    triggerDownload(blob, 'sam-submission-' + new Date().toISOString().slice(0, 10) + '.json');
  }

  document.getElementById('refreshBtn').addEventListener('click', load);
  document.getElementById('copyBtn').addEventListener('click', copyAsText);
  document.getElementById('downloadTextBtn').addEventListener('click', downloadText);
  document.getElementById('downloadJsonBtn').addEventListener('click', downloadJson);
  document.getElementById('lockBtn').addEventListener('click', () => {
    clearVerified();
    location.reload();
  });

  mountPasswordGate(() => { load(); });
})();
</script>
</body>
</html>
